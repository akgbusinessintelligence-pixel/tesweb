<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | FreshNest Cleaning Co.</title>
  <meta http-equiv="refresh" content="5;url=index.html" />
  <style>
    :root {
      --primary: #0ea5a8;
      --primary-dark: #0b7d80;
      --bg: #f6fbfb;
      --text: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #e8f8f8 0%, #f9fcfc 60%);
      padding: 1rem;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 0.8rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--primary-dark);
    }

    p {
      margin: 0.5rem 0;
      color: var(--muted);
    }

    .cta {
      margin-top: 1.25rem;
      display: inline-block;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 700;
      padding: 0.8rem 1.25rem;
      border-radius: 0.6rem;
    }

    .cta:hover { background: var(--primary-dark); }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 - Page Not Found</h1>
    <p>We couldn't find that page.</p>
    <p>You will be redirected to the FreshNest homepage in a few seconds.</p>
    <a class="cta" href="index.html">Go to Homepage</a>
  </main>
</body>
</html>
